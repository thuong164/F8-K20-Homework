        width: 100px;
        border-style: solid;

        border-color: transparent transparent rgb(45, 209, 146) transparent;

    .mui-ten-trai{
        border-width: 30px 80px;
        border-color: transparent rgb(96, 10, 207) transparent  transparent ;
        border-style: solid;
    }
    .la-co{
        border-width: 70px 70px 70px 170px; 
        border-color: rgb(238, 71, 10) transparent rgb(238, 71, 10) rgb(238, 71, 10)  ;
        border-style: solid;

    .f8{

}
